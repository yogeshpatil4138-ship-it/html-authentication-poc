<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Auth System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <i class="bi bi-patch-question fs-1 text-primary"></i>
                            <h2 class="mt-2">Forgot Password?</h2>
                            <p class="text-muted">No worries! Enter your email and we'll send you a link to reset it.</p>
                        </div>
                        
                        <form>
                            <div class="mb-3 text-start">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" placeholder="example@email.com" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Send Reset Link</button>
                        </form>

                        <div class="mt-4">
                            <p class="mb-1">
                                <a href="reset-password.html" class="text-decoration-none small text-success">
                                    Go to Reset Password Page<i class="bi bi-arrow-right"></i>
                                </a>
                            </p>
                            <p class="mb-0">
                                <a href="index.html" class="text-decoration-none small">
                                    <i class="bi bi-arrow-left"></i> Back to Login
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
