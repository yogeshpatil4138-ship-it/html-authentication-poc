<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auth System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light"> 
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-shield-check"></i> AuthSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Profile</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="index.html" class="btn btn-danger btn-sm px-3">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-12 mb-4">
                <div class="card bg-white p-4">
                    <div class="card-body">
                        <h2 class="display-6">Welcome back, <span class="text-primary font-weight-bold">Yogesh!</span></h2>
                        <p class="text-muted">Here is what's happening with your account today.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card text-center p-3">
                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                    <h5 class="mt-2">Profile Active</h5>
                    <p class="small text-muted">Last login: 2 mins ago</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center p-3">
                    <i class="bi bi-bell-fill fs-1 text-warning"></i>
                    <h5 class="mt-2">3 Notifications</h5>
                    <p class="small text-muted">Check your inbox</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center p-3">
                    <i class="bi bi-gear-fill fs-1 text-secondary"></i>
                    <h5 class="mt-2">Settings</h5>
                    <p class="small text-muted">Update preferences</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
